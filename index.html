<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FreshBasket — Online Grocery Store</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green:   #2d6a4f;
      --green2:  #40916c;
      --lime:    #95d5b2;
      --cream:   #fdfaf4;
      --sand:    #f0e9d6;
      --text:    #1a1a1a;
      --muted:   #6b7280;
      --danger:  #e53e3e;
      --shadow:  0 4px 24px rgba(0,0,0,.10);
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--cream);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      background: var(--green);
      color: #fff;
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 68px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 16px rgba(0,0,0,.18);
    }
    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.7rem;
      letter-spacing: -.5px;
    }
    .logo span { color: var(--lime); }
    .cart-badge-btn {
      background: var(--lime);
      color: var(--green);
      border: none;
      border-radius: 24px;
      padding: .5rem 1.2rem;
      font-family: 'DM Sans', sans-serif;
      font-weight: 600;
      font-size: .95rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: .5rem;
      transition: background .2s, transform .15s;
    }
    .cart-badge-btn:hover { background: #b7e4c7; transform: scale(1.04); }
    .cart-count {
      background: var(--green);
      color: #fff;
      border-radius: 50%;
      width: 22px; height: 22px;
      display: flex; align-items: center; justify-content: center;
      font-size: .78rem;
      font-weight: 700;
    }

    /* ── HERO ── */
    .hero {
      background: linear-gradient(135deg, #1b4332 0%, var(--green2) 60%, #74c69d 100%);
      color: #fff;
      padding: 3.5rem 2rem 3rem;
      text-align: center;
    }
    .hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 5vw, 3.4rem);
      line-height: 1.15;
      margin-bottom: .8rem;
    }
    .hero p { font-size: 1.1rem; opacity: .85; font-weight: 300; }

    /* ── LAYOUT ── */
    .page {
      max-width: 1280px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem 4rem;
      display: grid;
      grid-template-columns: 1fr 380px;
      gap: 2rem;
      align-items: start;
    }
    @media (max-width: 900px) {
      .page { grid-template-columns: 1fr; }
    }

    /* ── SECTION TITLES ── */
    .section-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.55rem;
      margin-bottom: 1.25rem;
      color: var(--green);
    }

    /* ── PRODUCT GRID ── */
    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 1.25rem;
    }
    .product-card {
      background: #fff;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: var(--shadow);
      transition: transform .2s, box-shadow .2s;
      display: flex;
      flex-direction: column;
    }
    .product-card:hover { transform: translateY(-4px); box-shadow: 0 8px 32px rgba(0,0,0,.13); }

    .product-img {
      height: 130px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3.8rem;
      background: var(--sand);
    }
    .product-info { padding: 1rem; flex: 1; display: flex; flex-direction: column; }
    .product-name { font-weight: 600; font-size: .95rem; margin-bottom: .25rem; }
    .product-unit { font-size: .8rem; color: var(--muted); margin-bottom: .5rem; }
    .product-price { font-weight: 700; color: var(--green); font-size: 1.05rem; margin-bottom: .9rem; }

    .add-btn {
      margin-top: auto;
      background: var(--green);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: .5rem .9rem;
      font-family: 'DM Sans', sans-serif;
      font-weight: 600;
      font-size: .88rem;
      cursor: pointer;
      transition: background .2s, transform .15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .4rem;
    }
    .add-btn:hover { background: var(--green2); transform: scale(1.03); }
    .add-btn.added { background: #e8f5e9; color: var(--green); }

    /* ── CART PANEL ── */
    .cart-panel {
      background: #fff;
      border-radius: 20px;
      box-shadow: var(--shadow);
      padding: 1.5rem;
      position: sticky;
      top: 84px;
    }
    .cart-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.2rem;
    }
    .cart-header h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.35rem;
      color: var(--green);
    }
    .clear-btn {
      background: none;
      border: none;
      color: var(--muted);
      font-size: .82rem;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      text-decoration: underline;
    }
    .clear-btn:hover { color: var(--danger); }

    /* Empty cart */
    .empty-cart {
      text-align: center;
      padding: 2.5rem 1rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: .75rem;
      animation: fadeIn .4s ease;
    }
    .empty-cart .empty-icon { font-size: 3.5rem; }
    .empty-cart p { color: var(--muted); font-size: .95rem; line-height: 1.5; }
    .empty-cart strong { display: block; font-size: 1.05rem; color: var(--text); }

    /* Cart items */
    .cart-items { display: flex; flex-direction: column; gap: .75rem; }
    .cart-item {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: .75rem;
      padding: .75rem;
      background: var(--sand);
      border-radius: 12px;
      animation: slideIn .25s ease;
    }
    .cart-item-emoji { font-size: 1.8rem; }
    .cart-item-name { font-weight: 600; font-size: .9rem; }
    .cart-item-price { font-size: .8rem; color: var(--muted); }

    /* Qty controls */
    .qty-controls {
      display: flex;
      align-items: center;
      gap: .4rem;
    }
    .qty-btn {
      width: 28px; height: 28px;
      border-radius: 50%;
      border: 2px solid var(--green);
      background: #fff;
      color: var(--green);
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s, color .15s;
      line-height: 1;
    }
    .qty-btn:hover { background: var(--green); color: #fff; }
    .qty-btn.remove { border-color: var(--danger); color: var(--danger); }
    .qty-btn.remove:hover { background: var(--danger); color: #fff; }
    .qty-num {
      min-width: 22px;
      text-align: center;
      font-weight: 700;
      font-size: .95rem;
    }

    /* Divider & totals */
    .cart-divider {
      border: none;
      border-top: 1.5px dashed #d1e7dd;
      margin: 1.25rem 0;
    }
    .cart-row {
      display: flex;
      justify-content: space-between;
      font-size: .9rem;
      margin-bottom: .4rem;
      color: var(--muted);
    }
    .cart-total {
      display: flex;
      justify-content: space-between;
      font-weight: 700;
      font-size: 1.15rem;
      color: var(--green);
      margin-top: .5rem;
    }
    .checkout-btn {
      width: 100%;
      margin-top: 1.25rem;
      background: var(--green);
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: .85rem;
      font-family: 'DM Sans', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      transition: background .2s, transform .15s;
      letter-spacing: .3px;
    }
    .checkout-btn:hover { background: var(--green2); transform: scale(1.02); }
    .checkout-btn:disabled { background: #ccc; cursor: default; transform: none; }

    /* Toast */
    #toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--green);
      color: #fff;
      padding: .7rem 1.5rem;
      border-radius: 24px;
      font-weight: 600;
      font-size: .9rem;
      opacity: 0;
      transition: transform .3s ease, opacity .3s ease;
      z-index: 999;
      pointer-events: none;
    }
    #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

    /* Animations */
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">Fresh<span>Basket</span> 🛒</div>
  <button class="cart-badge-btn" onclick="scrollToCart()">
    🛍️ Cart
    <span class="cart-count" id="cartCount">0</span>
  </button>
</header>

<!-- HERO -->
<div class="hero">
  <h1>Farm-fresh groceries,<br>delivered to your door.</h1>
  <p>Add items to your cart and we'll take care of the rest.</p>
</div>

<!-- MAIN CONTENT -->
<div class="page">

  <!-- PRODUCTS -->
  <div>
    <h2 class="section-title">🛒 Shop Groceries</h2>
    <div class="products-grid" id="productsGrid"></div>
  </div>

  <!-- CART PANEL -->
  <div class="cart-panel" id="cartPanel">
    <div class="cart-header">
      <h2>Your Cart</h2>
      <button class="clear-btn" onclick="clearCart()">Clear all</button>
    </div>
    <div id="cartBody"></div>
  </div>

</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
  // ── DATA ──────────────────────────────────────────────────
  const PRODUCTS = [
    { id: 1,  name: "Organic Apples",    emoji: "🍎", unit: "Pack of 6",    price: 120 },
    { id: 2,  name: "Bananas",           emoji: "🍌", unit: "Dozen",        price: 60  },
    { id: 3,  name: "Strawberries",      emoji: "🍓", unit: "250 g punnet", price: 150 },
    { id: 4,  name: "Carrots",           emoji: "🥕", unit: "500 g bag",    price: 45  },
    { id: 5,  name: "Broccoli",          emoji: "🥦", unit: "1 head",       price: 80  },
    { id: 6,  name: "Cherry Tomatoes",   emoji: "🍅", unit: "250 g box",    price: 70  },
    { id: 7,  name: "Whole Milk",        emoji: "🥛", unit: "1 litre",      price: 65  },
    { id: 8,  name: "Free Range Eggs",   emoji: "🥚", unit: "6-pack",       price: 90  },
    { id: 9,  name: "Sourdough Bread",   emoji: "🍞", unit: "1 loaf",       price: 110 },
    { id: 10, name: "Greek Yoghurt",     emoji: "🫙", unit: "500 g tub",    price: 95  },
    { id: 11, name: "Avocados",          emoji: "🥑", unit: "Pack of 3",    price: 130 },
    { id: 12, name: "Baby Spinach",      emoji: "🥬", unit: "100 g bag",    price: 55  },
  ];

  let cart = {}; // { productId: quantity }

  // ── RENDER PRODUCTS ───────────────────────────────────────
  function renderProducts() {
    const grid = document.getElementById('productsGrid');
    grid.innerHTML = PRODUCTS.map(p => `
      <div class="product-card">
        <div class="product-img">${p.emoji}</div>
        <div class="product-info">
          <div class="product-name">${p.name}</div>
          <div class="product-unit">${p.unit}</div>
          <div class="product-price">₹${p.price}</div>
          <button class="add-btn" id="addBtn${p.id}" onclick="addToCart(${p.id})">
            + Add to Cart
          </button>
        </div>
      </div>
    `).join('');
  }

  // ── CART ACTIONS ──────────────────────────────────────────
  function addToCart(id) {
    cart[id] = (cart[id] || 0) + 1;
    updateCartUI();
    const p = PRODUCTS.find(x => x.id === id);
    showToast(`${p.emoji} ${p.name} added!`);
  }

  function changeQty(id, delta) {
    cart[id] = (cart[id] || 0) + delta;
    if (cart[id] <= 0) delete cart[id];
    updateCartUI();
  }

  function clearCart() {
    cart = {};
    updateCartUI();
    showToast('🗑️ Cart cleared');
  }

  // ── UPDATE CART UI ────────────────────────────────────────
  function updateCartUI() {
    const items = Object.entries(cart);
    const totalItems = items.reduce((s, [, q]) => s + q, 0);
    const subtotal   = items.reduce((s, [id, q]) => s + PRODUCTS.find(p => p.id == id).price * q, 0);
    const delivery   = subtotal > 0 ? (subtotal >= 500 ? 0 : 49) : 0;
    const total      = subtotal + delivery;

    // Badge
    document.getElementById('cartCount').textContent = totalItems;

    // Body
    const body = document.getElementById('cartBody');

    if (items.length === 0) {
      body.innerHTML = `
        <div class="empty-cart">
          <div class="empty-icon">🛒</div>
          <div>
            <strong>Your cart is empty</strong>
            <p>Add some fresh groceries from the store to get started!</p>
          </div>
        </div>`;
      return;
    }

    const itemsHTML = items.map(([id, qty]) => {
      const p = PRODUCTS.find(x => x.id == id);
      const lineTotal = p.price * qty;
      return `
        <div class="cart-item">
          <div class="cart-item-emoji">${p.emoji}</div>
          <div>
            <div class="cart-item-name">${p.name}</div>
            <div class="cart-item-price">₹${p.price} × ${qty} = <strong>₹${lineTotal}</strong></div>
          </div>
          <div class="qty-controls">
            <button class="qty-btn ${qty === 1 ? 'remove' : ''}"
              onclick="changeQty(${id}, -1)">${qty === 1 ? '🗑' : '−'}</button>
            <span class="qty-num">${qty}</span>
            <button class="qty-btn" onclick="changeQty(${id}, 1)">+</button>
          </div>
        </div>`;
    }).join('');

    body.innerHTML = `
      <div class="cart-items">${itemsHTML}</div>
      <hr class="cart-divider" />
      <div class="cart-row"><span>Subtotal</span><span>₹${subtotal}</span></div>
      <div class="cart-row">
        <span>Delivery</span>
        <span>${delivery === 0 ? '<span style="color:var(--green2);font-weight:600">Free 🎉</span>' : '₹' + delivery}</span>
      </div>
      ${subtotal > 0 && subtotal < 500 ? `<div style="font-size:.78rem;color:var(--muted);margin-top:.25rem">Add ₹${500-subtotal} more for free delivery</div>` : ''}
      <div class="cart-total"><span>Total</span><span>₹${total}</span></div>
      <button class="checkout-btn" onclick="checkout()">Proceed to Checkout →</button>`;
  }

  // ── TOAST ─────────────────────────────────────────────────
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
  }

  // ── CHECKOUT ──────────────────────────────────────────────
  function checkout() {
    showToast('✅ Order placed! Thank you for shopping with FreshBasket.');
    setTimeout(() => { cart = {}; updateCartUI(); }, 2400);
  }

  function scrollToCart() {
    document.getElementById('cartPanel').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  // ── INIT ──────────────────────────────────────────────────
  renderProducts();
  updateCartUI();
</script>
</body>
</html>
